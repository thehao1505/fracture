<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Button Component</title>
    <style>
        /*
         * Basic page setup for centering the component.
         */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /*
         * Button Component Styles
         */
        .model-connection-button {
            /* Text and Font */
            color: #ffffff;
            font-size: 16px;
            font-weight: 500;
            
            /* Background and Border */
            background-color: #1a73e8; /* Normal state blue */
            border: none;
            border-radius: 20px; /* Rounded corners */
            
            /* Sizing and Spacing */
            padding: 12px 28px;
            
            /* Interaction */
            cursor: pointer;
            outline: none;
            
            /* Smooth transition for state changes */
            transition: background-color 0.2s ease-in-out, transform 0.1s ease;
        }

        /*
         * Hover State
         * Changes the background to a lighter blue as shown in the second image.
         */
        .model-connection-button:hover {
            background-color: #4285f4; /* Lighter blue for hover */
        }

        /*
         * Active (Pressed) State
         * Simulates the button being pressed down.
         */
        .model-connection-button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <!-- 
      The button element is used for its semantic meaning and accessibility features.
      The class applies the custom styles defined in the <style> block.
    -->
    <button class="model-connection-button">
        Create Model Connection
    </button>

    <!-- 
      No JavaScript is required for this component.
      The interactive hover and active states are handled efficiently by CSS pseudo-classes (:hover, :active).
    -->

</body>
</html>
