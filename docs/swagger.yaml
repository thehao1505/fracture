basePath: /api/v1
definitions:
  handler.createBlockRequest:
    type: object
  handler.createProfileRequest:
    type: object
  handler.createUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
    required:
    - email
    - name
    type: object
  handler.loginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  handler.registerRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        maxLength: 72
        minLength: 8
        type: string
    required:
    - email
    - name
    - password
    type: object
  handler.reorderRequest:
    properties:
      order:
        items:
          type: string
        type: array
    required:
    - order
    type: object
  handler.updateBlockRequest:
    type: object
  handler.updateProfileRequest:
    type: object
  handler.updateUserRequest:
    properties:
      email:
        type: string
      name:
        type: string
    type: object
host: localhost:8080
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: A clean architecture Go API for managing users.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Fracture API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Verify credentials and return a signed JWT access token.
      parameters:
      - description: Login payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.loginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Invalid email or password
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Log in and obtain an access token
      tags:
      - auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Create a new user account. The password is hashed before storage.
      parameters:
      - description: Register payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.registerRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Account created successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Email already exists
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Register a new account
      tags:
      - auth
  /me/blocks:
    get:
      description: Returns all blocks (including hidden ones) for the authenticated
        user's profile.
      produces:
      - application/json
      responses:
        "200":
          description: Blocks
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Profile not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List my blocks
      tags:
      - blocks
    post:
      consumes:
      - application/json
      description: Adds a block to the authenticated user's profile.
      parameters:
      - description: Create block payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.createBlockRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Block created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body or content
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Profile not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a block
      tags:
      - blocks
  /me/blocks/{id}:
    delete:
      description: Deletes a block owned by the authenticated user.
      parameters:
      - description: Block ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Block deleted
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid block ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Profile not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a block
      tags:
      - blocks
    put:
      consumes:
      - application/json
      description: Updates type/content/visibility of a block owned by the authenticated
        user.
      parameters:
      - description: Block ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update block payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.updateBlockRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Block updated
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid block ID, request body or content
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Profile not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a block
      tags:
      - blocks
  /me/blocks/reorder:
    patch:
      consumes:
      - application/json
      description: Sets the position of every block from the given ordered list of
        block IDs.
      parameters:
      - description: Ordered block IDs
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.reorderRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Blocks reordered
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid block ID or order does not match existing blocks
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Profile not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Reorder blocks
      tags:
      - blocks
  /me/profile:
    get:
      description: Returns the authenticated user's full profile (including drafts
        and all blocks).
      produces:
      - application/json
      responses:
        "200":
          description: Profile
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Profile not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get my profile
      tags:
      - profiles
    post:
      consumes:
      - application/json
      description: Creates the profile for the authenticated user (one profile per
        user).
      parameters:
      - description: Create profile payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.createProfileRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Profile created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Profile or username already exists
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create my profile
      tags:
      - profiles
    put:
      consumes:
      - application/json
      description: Updates username/bio/avatar/appearance/publish state for the authenticated
        user.
      parameters:
      - description: Update profile payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.updateProfileRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Profile updated
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Profile not found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Username already exists
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update my profile
      tags:
      - profiles
  /p/{username}:
    get:
      description: Public link-in-bio page. Returns the profile and its active blocks
        only when published.
      parameters:
      - description: Profile username
        in: path
        name: username
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Public profile
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Profile not found or not published
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get a public profile by username
      tags:
      - profiles
  /p/{username}/blocks/{id}/click:
    post:
      description: Increments the block click count and returns the destination URL
        for the client to redirect to.
      parameters:
      - description: Profile username
        in: path
        name: username
        required: true
        type: string
      - description: Block ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Destination URL
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid block ID or non-clickable block
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Profile or block not found
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Record a click on a public block
      tags:
      - profiles
  /users:
    get:
      consumes:
      - application/json
      description: List users with pagination and optional keyword search on name/email
      parameters:
      - description: Page number (default 1)
        in: query
        name: page
        type: integer
      - description: Items per page (default 20, max 100)
        in: query
        name: limit
        type: integer
      - description: Search keyword (matches name or email)
        in: query
        name: keyword
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Users retrieved successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: List users
      tags:
      - users
    post:
      consumes:
      - application/json
      description: Create a new user with email and name
      parameters:
      - description: Create user payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.createUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: User created successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request body
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Email already exists
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Create a new user
      tags:
      - users
  /users/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a user by ID
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User deleted successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid user ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Delete a user
      tags:
      - users
    get:
      consumes:
      - application/json
      description: Retrieve a user from the database by providing their UUID
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User retrieved successfully
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid user ID
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Get a user by ID
      tags:
      - users
    put:
      consumes:
      - application/json
      description: Update a user by ID with email and/or name
      parameters:
      - description: User ID (UUID)
        in: path
        name: id
        required: true
        type: string
      - description: Update user payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.updateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User updated successfully
          schema:
            additionalProperties:
              type: string
            type: object
        "400":
          description: Invalid user ID or request body
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties:
              type: string
            type: object
        "409":
          description: Email already exists
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal server error
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - BearerAuth: []
      summary: Update a user
      tags:
      - users
schemes:
- http
- https
securityDefinitions:
  BearerAuth:
    description: 'Type "Bearer" followed by a space and your JWT access token. Example:
      "Bearer eyJhbGci..."'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
