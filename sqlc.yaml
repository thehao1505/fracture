version: "2"
sql:
  - engine: "postgresql"
    # Read the schema straight from the golang-migrate up-migrations
    # (down files are excluded so their DROP statements don't confuse sqlc).
    schema: "migrations/*.up.sql"
    queries: "internal/infrastructure/persistence/queries"
    gen:
      go:
        package: "sqlcgen"
        out: "internal/infrastructure/persistence/sqlcgen"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: true
        overrides:
          # Map Postgres types to the same Go types the domain layer uses,
          # instead of sqlc's default pgtype.* wrappers.
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "timestamptz"
            go_type: "time.Time"
